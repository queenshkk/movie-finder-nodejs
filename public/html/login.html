<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../fontawesome/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <script type="module" src="../js/main.js" defer></script>
    <script type="module" src="../js/login.js" defer></script>
    <title>Connexion - MovieFinder</title>
</head>

<body>
    <header class="header">
        <a href="index.html" class="logo">
            <img src="../images/movie-or.png" alt="MovieFinder">
        </a>

        <nav class="menu">
            <a href="index.html">
                <i class="fa-solid fa-house"></i>
                Accueil
            </a>
            <a href="all-films.html">Tous les films</a>
            <a href="plateformes.html">Plateformes</a>
            <a href="favorites.html">Favoris</a>
            <a href="about.html">À propos</a>
        </nav>

        <div class="auth-dropdown">
            <button id="auth-btn" class="connect" type="button">
                <i class="fa-solid fa-user"></i>
                S'identifier
            </button>

            <div id="auth-menu" class="auth-menu">
                <a href="register.html">
                    <i class="fa-solid fa-user-plus"></i>
                    S'inscrire
                </a>

                <a href="login.html">
                    <i class="fa-solid fa-right-to-bracket"></i>
                    Se connecter
                </a>

                <button id="logout-btn" type="button">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    Se déconnecter
                </button>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="auth-card">
            <h1>Connexion</h1>
            <p>Connectez-vous pour gérer vos favoris.</p>

            <form id="login-form">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" required>

                <label for="password">Mot de passe</label>
                <input id="password" name="password" type="password" required>

                <button type="submit">Se connecter</button>
            </form>

            <p id="login-feedback" class="feedback"></p>

            <p class="auth-link">Pas encore de compte ? <a href="register.html">S'inscrire</a>
            </p>
        </section>
    </main>

    <footer>
        <p>Projet réalisé par : Nathan De Witte et Nguyen Quynh</p>
        <p>Technologies : Node.js, Express, HTML, CSS et JavaScript Vanilla</p>
    </footer>
</body>
</html>
